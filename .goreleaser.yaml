version: 2

project_name: manhunt

before:
  hooks:
    - go mod tidy

builds:
  - id: manhunt
    main: ./cmd/manhunt
    binary: manhunt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: manhunt
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: >-
    {{ incpatch .Version }}-next

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  draft: true
  name_template: "Manhunt {{ .Version }}"